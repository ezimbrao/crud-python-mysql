<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuários</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell page-card">
        <section class="page-header">
            <h1>Lista de Usuários</h1>
            <a class="btn primary" href="/criar">Novo Usuário</a>
        </section>

        <ul class="user-list">
            {% for u in usuarios %}
                <li class="user-item">
                    <div class="user-info">
                        <strong>{{ u.nome }}</strong>
                        <span>{{ u.email }}</span>
                    </div>
                    <div class="actions">
                        <a class="btn secondary" href="/editar/{{ u.id }}">Editar</a>
                        <a class="btn danger" href="/deletar/{{ u.id }}">Excluir</a>
                    </div>
                </li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
